<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shonen Shelf</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Russo+One&family=Roboto:wght@300;400;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "shonen-red": "#DC2626",
                        "shonen-dark": "#0f172a",
                        "shonen-black": "#020617",
                        "shonen-gray": "#1e293b",
                    },
                    fontFamily: {
                        headings: ['"Russo One"', "sans-serif"],
                        body: ['"Roboto"', "sans-serif"],
                    },
                },
            },
        };
    </script>
</head>

<body class="bg-shonen-dark text-white font-body min-h-screen flex flex-col">
    <nav class="bg-shonen-black border-b border-shonen-red sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-20 items-center">
                <div class="cursor-pointer">
                    <a href="index.html">
                        <span
                            class="font-headings text-2xl tracking-wider text-white hover:text-shonen-red transition-colors">
                            SHONEN
                            <span class="text-shonen-red">
                                SHELF
                            </span>
                        </span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-6 text-sm font-bold uppercase tracking-wide">
                    <button class="hover:text-shonen-red transition-colors"><a href="index.html">Accueil</a>
                    </button>
                    <button class="hover:text-shonen-red transition-colors"><a href="catalogue.html">Catalogue</a>
                    </button>
                    <button class="hover:text-shonen-red transition-colors"><a href="a-propos.html">À propos</a>
                    </button>
                    <button class="hover:text-shonen-red transition-colors"><a href="equipe.html">L'équipe</a>
                    </button>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="showPage('login')" class="text-gray-300 hover:text-white flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span class="hidden sm:inline text-xs">Connexion / Inscription</span>
                    </button>
                    <button onclick="showPage('panier')"
                        class="bg-shonen-red hover:bg-red-700 text-white p-2 rounded-sm transition-colors relative">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                            </path>
                        </svg>
                        <span
                            class="absolute -top-2 -right-2 bg-white text-shonen-red text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow">
        <div id="accueil" class="page-section active-section">
            <section class="hero-bg h-[500px] flex items-center justify-center text-center px-4">
                <div>
                    <h1 class="text-5xl md:text-7xl font-headings mb-4">Étagère de <span
                            class="text-shonen-red">légendes</span></h1>
                    <p class="text-xl text-gray-300 mb-8 max-w-2xl mx-auto">Le sanctuaire ultime pour vos collections.
                    </p>
                    <button
                        class="bg-shonen-red hover:bg-white hover:text-shonen-red text-white font-bold py-3 px-8 tracking-widest transition-all border-2 border-transparent hover:border-shonen-red">
                        <a href="catalogue.html">Voir la collection</a>
                    </button>
                </div>
            </section>
            <section class="py-12 bg-shonen-dark">
                <div class="maw-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-shonen-gray p-6 border border-shonen-red hover:bg-gray-700 transition cursor-pointer"
                        onclick="showPage('catalogue')">
                        <h3 class="font-headings text-2xl">Manga</h3>
                        <p class="text-gray-400 text-sm">Shonen, Seinen, Shojo...</p>
                    </div>
                    <div class="bg-shonen-gray p-6 border border-shonen-red hover:bg-gray-700 transition cursor-pointer"
                        onclick="showPage('catalogue')">
                        <h3 class="font-headings text-2xl">Comics</h3>
                        <p class="text-gray-400 text-sm">Marvel</p>
                    </div>
                    <div class="bg-shonen-gray p-6 border border-shonen-red hover:bg-gray-700 transition cursor-pointer"
                        onclick="showPage('catalogue')">
                        <h3 class="font-headings text-2xl">BD</h3>
                        <p class="text-gray-400 text-sm">Franco-Belge, Romans graphiques...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer class="bg-shonen-black py-8 text-center border-t border-gray-800 mt-auto">
        <p class="text-gray-500 text-sm">
            &copy; 2026 Shonen Shelf
        </p>
    </footer>
</body>

</html>
